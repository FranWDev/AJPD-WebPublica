<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacta con AJPD - Asociación Juvenil Proyecto Dubini. Estamos aquí para escucharte y colaborar juntos.">

    <title>Contacto - AJPD</title>
    <link rel="stylesheet" href="/styles/contact.css">
    <link rel="stylesheet" href="/styles/layout/header.css">
    <link rel="stylesheet" href="/styles/layout/footer.css">
    <link rel="stylesheet" href="/styles/components/content.css">
    <link rel="stylesheet" href="/styles/components/wsp-icon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/base.css">
</head>

<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main role="main">
        <section class="contact-section">
            <div class="container">
                <div class="contact-grid">
                    <!-- Columna de Información -->
                    <div class="contact-info animate-fadeIn">
                        <h1>Ponte en Contacto</h1>
                        <div class="info-items">
                            <div class="info-item">
                                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                                <div>
                                    <h3>Email</h3>
                                    <a href="mailto:contacto@proyectodubini.org">contacto@proyectodubini.org</a>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                                <div>
                                    <h3>Instagram</h3>
                                    <a href="https://instagram.com/proyectodubini" target="_blank">@proyectodubini</a>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="icon-box"><i class="fab fa-tiktok"></i></div>
                                <div>
                                    <h3>TikTok</h3>
                                    <a href="https://tiktok.com/@proyectodubini" target="_blank">@proyectodubini</a>
                                </div>
                            </div>
                        </div>

                        <div class="map-container">
                            <h3>Nuestra Sede</h3>
                            <div class="google-map">
                                <iframe src="https://www.google.com/maps?ll=28.491945,-16.329517&z=17&t=m&hl=en&gl=US&mapclient=embed&q=Calle+Leopoldo+de+la+Rosa+Olivera+38206+Santa+Cruz+de+Tenerife&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>
                        </div>
                    </div>

                    <!-- Columna del Formulario -->
                    <div class="contact-form-container animate-fadeIn fade-in-delay-1">
                        <form id="contactForm" class="contact-form">
                            <div class="form-group">
                                <label for="nombre">Nombre Completo</label>
                                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Correo Electrónico</label>
                                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                            </div>

                            <div class="form-group">
                                <label for="telefono">Teléfono (Opcional)</label>
                                <input type="tel" id="telefono" name="telefono" placeholder="Tu número de teléfono...">
                            </div>
                            
                            <div class="form-group">
                                <label for="asunto">Asunto</label>
                                <input type="text" id="asunto" name="asunto" placeholder="¿En qué podemos ayudarte?" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="mensaje">Mensaje</label>
                                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                            </div>

                            <button type="submit" id="submitBtn" class="submit-btn">
                                <span>Enviar Mensaje</span>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                        <div id="formStatus" class="form-status"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/wsp-icon :: wsp-icon}"></div>
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="/scripts/script.js"></script>
    <script src="/scripts/pages/contact.js"></script>
</body>

</html>
